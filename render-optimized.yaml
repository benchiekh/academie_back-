services:
  # API Service avec Supabase - Optimisé pour Render Free
  - type: web
    name: academie-backend
    env: node
    plan: free
    runtime: node18
    buildCommand: npm ci --only=production && npm run build && npx prisma generate
    startCommand: npm run start:prod
    healthCheckPath: /
    healthCheckTimeout: 30
    autoDeploy: true
    
    envVars:
      # Environment
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      
      # Supabase Database (remplacez avec vos vraies valeurs)
      - key: DATABASE_URL
        value: postgresql://postgres:[VOTRE_MDP]@db.xxxx.supabase.co:5432/postgres
      - key: JWT_SECRET
        value: votre-secret-jwt-tres-long-et-unique-pour-production
      
      # Optimisations mémoire et performance
      - key: NODE_OPTIONS
        value: --max-old-space-size=512 --max-semi-space-size=64
      - key: WEB_CONCURRENCY
        value: "1"
      
    # Configuration pour le plan gratuit Render
    disk:
      name: academie-disk
      sizeGB: 1
      mountPath: /opt/render/project/src
