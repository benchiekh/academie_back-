services:
  # API Service avec Supabase - Simple JS Approach
  - type: web
    name: academie-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node main.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Remplacez avec votre vraie URL Supabase
      - key: DATABASE_URL
        value: postgresql://postgres:[VOTRE_MDP]@db.xxxx.supabase.co:5432/postgres
      - key: JWT_SECRET
        value: votre-secret-jwt-tres-long-et-unique-pour-production
